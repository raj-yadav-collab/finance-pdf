<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal - Windbrook Solutions</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>Windbrook Solutions</h1>
                <p class="tagline">Client Report Portal</p>
            </div>
            <button class="btn btn-primary" onclick="goToNewClient()">+ Add Client</button>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Dashboard Section -->
            <section class="dashboard-section">
                <h2>Clients</h2>
                
                <div id="loadingIndicator" class="loading-indicator" style="display: none;">
                    <p>Loading clients...</p>
                </div>
                
                <div id="clientsTable" class="clients-table">
                    <!-- Populated by JavaScript -->
                </div>
                
                <div id="emptyState" class="empty-state">
                    <p>No clients yet. <a href="#" onclick="goToNewClient(); return false;">Create one now</a></p>
                </div>
            </section>
        </main>
    </div>

    <!-- JavaScript -->
    <script src="/static/js/main.js"></script>
    <script>
        // Load dashboard on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadDashboard();
        });

        async function loadDashboard() {
            try {
                const { response, data } = await fetchJSON('/dashboard');

                if (data && data.success) {
                    displayClients(data.data.clients);
                } else {
                    showError('Failed to load dashboard');
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
                showError('Error loading dashboard');
            }
        }

        function displayClients(clients) {
            const tableDiv = document.getElementById('clientsTable');
            const emptyState = document.getElementById('emptyState');
            
            if (clients.length === 0) {
                tableDiv.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Last Report</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            clients.forEach(client => {
                const reportDate = client.last_report_date ? formatDate(client.last_report_date) : 'None';
                html += `
                    <tr>
                        <td><strong>${escapeHtml(client.display_name)}</strong></td>
                        <td>${reportDate}</td>
                        <td>
                            <a href="#" onclick="goToClientDetail(${client.id}); return false;" class="link">View Profile</a>
                            <a href="#" onclick="goToReportEntry(${client.id}); return false;" class="link">Generate Report</a>
                        </td>
                    </tr>
                `;
            });
            
            html += `
                    </tbody>
                </table>
            `;
            
            tableDiv.innerHTML = html;
            tableDiv.style.display = 'block';
        }

        function goToNewClient() {
            window.location.href = '/client_new.html';
        }

        function goToClientDetail(clientId) {
            window.location.href = `/client_detail.html?id=${clientId}`;
        }

        function goToReportEntry(clientId) {
            // First initiate a report, then go to report entry
            initiateReport(clientId);
        }

        async function initiateReport(clientId) {
            try {
                const today = new Date().toISOString().split('T')[0];
                const { response, data } = await fetchJSON('/reports/initiate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        client_id: clientId,
                        report_date: today
                    })
                });

                if (response.ok && data && data.success) {
                    window.location.href = `/report_entry.html?id=${data.data.report_id}`;
                } else {
                    showError(getApiErrorMessage(data, 'Failed to initiate report'));
                }
            } catch (error) {
                console.error('Error initiating report:', error);
                showError('Error initiating report');
            }
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T00:00:00Z');
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(message) {
            alert('Error: ' + message);
        }
    </script>
</body>
</html>
